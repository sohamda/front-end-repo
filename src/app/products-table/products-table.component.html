<div class="container">
  <h2>Products</h2>

  <div *ngIf="loading" class="loading">Loading products...</div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Price (€)</th>
        <th>Category</th>
        <th>Land of Origin</th>
        <th>InStock</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.name }}</td>
        <td>{{ product.description }}</td>
        <td>{{ product.price | currency:'EUR':'symbol':'1.2-2' }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.landOfOrigin }}</td>
        <td>{{ product.inStock }}</td>
      </tr>
    </tbody>
  </table>
</div>
