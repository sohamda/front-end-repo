<div class="container">
  <h2>Products</h2>

  <div *ngIf="loading" class="loading">Loading products...</div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Price ($)</th>
        <th>Category</th>
        <th>Brand</th>
        <th>Stock</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.id }}</td>
        <td>{{ product.title }}</td>
        <td>{{ product.price | number:'1.2-2' }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.brand }}</td>
        <td>{{ product.stock }}</td>
        <td>{{ product.rating | number:'1.1-1' }}</td>
      </tr>
    </tbody>
  </table>
</div>
