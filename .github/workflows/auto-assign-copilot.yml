name: Auto Assign Copilot

on:
  issues:
    types:
      - opened

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign issue to copilot
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = context.payload.issue?.assignees ?? [];
            if (assignees.length > 0) {
              core.info(`Issue #${context.issue.number} already has assignees; skipping.`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: ['copilot']
              });
              core.info(`Assigned issue #${context.issue.number} to copilot.`);
            } catch (error) {
              core.setFailed(`Failed to assign issue #${context.issue.number} to copilot: ${error.message}`);
            }
