name: Auto Assign Copilot

on:
  issues:
    types:
      - opened
  workflow_dispatch:

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Assign an open unassigned issue to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          ISSUE_NUMBER="$(gh api "repos/$REPO/issues?state=open&per_page=100" --jq '[.[] | select(.pull_request | not) | select((.assignees | length) == 0)][0].number')"

          if [[ -z "$ISSUE_NUMBER" || "$ISSUE_NUMBER" == "null" ]]; then
            echo "No open unassigned issues found."
            exit 0
          fi

          ASSIGNED=false

          for ASSIGNEE in "copilot-swe-agent[bot]" "copilot-swe-agent" "Copilot" "copilot"; do
            echo "Trying assignee: $ASSIGNEE"
            gh api "repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
              --method POST \
              --input - <<< "{\"assignees\":[\"$ASSIGNEE\"]}" 2>&1 || true

            CURRENT="$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '[.assignees[].login] | join(",")')"
            if echo "$CURRENT" | grep -qi "copilot"; then
              echo "✅ Assigned $ASSIGNEE to issue #$ISSUE_NUMBER (current: $CURRENT)"
              ASSIGNED=true
              break
            else
              echo "  Not assigned (current: $CURRENT)"
            fi
          done

          if [[ "$ASSIGNED" != "true" ]]; then
            echo "::warning::Could not auto-assign Copilot to issue #$ISSUE_NUMBER — assign manually from the UI"
          fi
